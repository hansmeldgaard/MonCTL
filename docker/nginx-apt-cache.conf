# MonCTL apt-cache — nginx reverse proxy with 30-day .deb cache
# Served behind HAProxy on /apt/* (HAProxy passes the path through unchanged)
#
# Cache strategy:
#   /apt/ubuntu/pool/*    → .deb files, 30 day cache
#   /apt/ubuntu/dists/*   → Release/Packages metadata, 10 minute cache
#   /apt/security/pool/*  → .deb files, 30 day cache
#   /apt/security/dists/* → Release/Packages metadata, 10 minute cache

proxy_cache_path /var/cache/nginx/apt
                 levels=1:2
                 keys_zone=apt:50m
                 max_size=20g
                 inactive=60d
                 use_temp_path=off;

# Upstream block is written by the entrypoint script to /etc/nginx/conf.d/upstream.conf
# which nginx auto-includes via its default conf.d/*.conf pattern (no explicit include needed)

server {
    listen 18080 default_server;
    server_name _;

    access_log /var/log/nginx/apt-access.log combined;

    # Ubuntu main archive — .deb packages (long-term cache)
    # Rewrite /apt/ubuntu/... → /ubuntu/... for upstream (archive.ubuntu.com)
    location /apt/ubuntu/pool/ {
        rewrite ^/apt/(.*)$ /$1 break;
        proxy_pass http://apt_upstream;
        proxy_cache apt;
        proxy_cache_valid 200 206 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 60s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_http_version 1.1;
        proxy_set_header Host archive.ubuntu.com;
        proxy_set_header Connection "";
    }

    # Ubuntu main archive — metadata (short cache)
    location /apt/ubuntu/ {
        rewrite ^/apt/(.*)$ /$1 break;
        proxy_pass http://apt_upstream;
        proxy_cache apt;
        proxy_cache_valid 200 206 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_http_version 1.1;
        proxy_set_header Host archive.ubuntu.com;
        proxy_set_header Connection "";
    }

    # Ubuntu security archive — .deb packages (long-term cache)
    # security.ubuntu.com serves at /ubuntu/... so rewrite /apt/security/ → /ubuntu/
    location /apt/security/pool/ {
        rewrite ^/apt/security/(.*)$ /ubuntu/$1 break;
        proxy_pass http://apt_security_upstream;
        proxy_cache apt;
        proxy_cache_valid 200 206 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 60s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_http_version 1.1;
        proxy_set_header Host security.ubuntu.com;
        proxy_set_header Connection "";
    }

    # Ubuntu security archive — metadata (short cache)
    location /apt/security/ {
        rewrite ^/apt/security/(.*)$ /ubuntu/$1 break;
        proxy_pass http://apt_security_upstream;
        proxy_cache apt;
        proxy_cache_valid 200 206 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_http_version 1.1;
        proxy_set_header Host security.ubuntu.com;
        proxy_set_header Connection "";
    }

    # Health endpoint (used by HAProxy backend check at /health, not /apt/health)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cache stats (localhost only)
    location = /cache-status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
