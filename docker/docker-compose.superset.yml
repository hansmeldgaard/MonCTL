# Apache Superset — BI frontend for MonCTL ClickHouse
#
# Intended host: dev server 10.145.210.10 (NOT production centrals).
# Deploy path:   /opt/superset/
#
# Secrets in /opt/superset/.env (not checked in):
#   SUPERSET_SECRET_KEY           — Flask session key (hex, 32+ bytes)
#   SUPERSET_DB_PW                — password for local Postgres metadata DB
#   SUPERSET_ADMIN_PW             — initial UI admin password
#   CLICKHOUSE_SUPERSET_USER      — CH user (default: monctl)
#   CLICKHOUSE_SUPERSET_PW        — CH password (default: monctl)
#
# First-time bring-up:
#   cd /opt/superset && docker compose --env-file .env up -d
#   # wait ~20s for Postgres, then the `superset-init` one-shot creates tables + admin
#   docker compose logs -f superset-init
#
# Served publicly via HAProxy at https://10.145.210.40/superset/ (SSO via MonCTL).
# Direct access on :8088 remains for diagnostics on the dev host only.
#
# Upgrade path to dedicated RO ClickHouse user:
#   Add to docker/clickhouse-config.xml <users> section:
#     <superset_ro>
#       <password_sha256_hex>...</password_sha256_hex>
#       <networks><ip>::/0</ip></networks>
#       <profile>readonly</profile>
#       <quota>default</quota>
#     </superset_ro>
#   Then redeploy CH and update CLICKHOUSE_SUPERSET_USER/PW here.

x-superset-common: &superset-common
  image: apache/superset:4.1.1
  env_file: .env
  environment:
    SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    SUPERSET_LOAD_EXAMPLES: "no"
    DATABASE_DIALECT: postgresql
    DATABASE_HOST: superset-db
    DATABASE_PORT: "5432"
    DATABASE_DB: superset
    DATABASE_USER: superset
    DATABASE_PASSWORD: ${SUPERSET_DB_PW}
    REDIS_HOST: superset-redis
    REDIS_PORT: "6379"
    # OAuth / SSO against MonCTL central
    MONCTL_OAUTH_CLIENT_ID: ${MONCTL_OAUTH_CLIENT_ID:-}
    MONCTL_OAUTH_CLIENT_SECRET: ${MONCTL_OAUTH_CLIENT_SECRET:-}
    MONCTL_PUBLIC_BASE: ${MONCTL_PUBLIC_BASE:-https://10.145.210.40}
    MONCTL_INTERNAL_BASE: ${MONCTL_INTERNAL_BASE:-http://10.145.210.41:8443}
    SUPERSET_PUBLIC_ORIGIN: ${SUPERSET_PUBLIC_ORIGIN:-https://10.145.210.40}
  volumes:
    - ./pythonpath:/app/pythonpath:ro
    - ./requirements-local.txt:/app/docker/requirements-local.txt:ro
    - superset_home:/app/superset_home
  depends_on:
    superset-db:
      condition: service_healthy
    superset-redis:
      condition: service_healthy

services:
  superset-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_DB_PW}
      POSTGRES_DB: superset
    volumes:
      - superset_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 256m

  superset-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - superset_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 128m

  # One-shot: installs CH driver, runs DB migrations, creates admin, seeds
  # CH connection. Exits 0 when done. Idempotent — safe to re-run.
  superset-init:
    <<: *superset-common
    restart: "no"
    entrypoint: ["/bin/bash", "/app/pythonpath/init.sh"]
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      DATABASE_DIALECT: postgresql
      DATABASE_HOST: superset-db
      DATABASE_PORT: "5432"
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: ${SUPERSET_DB_PW}
      REDIS_HOST: superset-redis
      REDIS_PORT: "6379"
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PW: ${SUPERSET_ADMIN_PW}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@monctl.local}
      CLICKHOUSE_SUPERSET_USER: ${CLICKHOUSE_SUPERSET_USER:-monctl}
      CLICKHOUSE_SUPERSET_PW: ${CLICKHOUSE_SUPERSET_PW:-monctl}
      CLICKHOUSE_HOST_PRIMARY: ${CLICKHOUSE_HOST_PRIMARY:-10.145.210.43}
      CLICKHOUSE_HOST_SECONDARY: ${CLICKHOUSE_HOST_SECONDARY:-10.145.210.44}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-monctl}

  superset:
    <<: *superset-common
    restart: unless-stopped
    ports:
      - "8088:8088"
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      # Superset's WSGI app is mounted at /bi via DispatcherMiddleware
      # (see superset_config.py FLASK_APP_MUTATOR), so /health only exists
      # under /bi/health — the root path returns 404 from the stub.
      test: ["CMD", "curl", "-f", "http://localhost:8088/bi/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    mem_limit: 1536m

volumes:
  superset_home:
  superset_pg:
  superset_redis:
