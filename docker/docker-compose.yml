services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: monctl
      POSTGRES_PASSWORD: monctl
      POSTGRES_DB: monctl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monctl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: monctl
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  central:
    build:
      context: ..
      dockerfile: docker/Dockerfile.central
    ports:
      - "8443:8443"
    environment:
      MONCTL_DATABASE_URL: postgresql+asyncpg://monctl:monctl@postgres:5432/monctl
      MONCTL_REDIS_URL: redis://redis:6379/0
      MONCTL_CLICKHOUSE_HOSTS: clickhouse
      MONCTL_CLICKHOUSE_PORT: 8123
      MONCTL_CLICKHOUSE_DATABASE: monctl
      MONCTL_CLICKHOUSE_USER: default
      MONCTL_CLICKHOUSE_PASSWORD: ""
      MONCTL_CLICKHOUSE_SECURE: "false"
      MONCTL_HOST: 0.0.0.0
      MONCTL_PORT: 8443
      MONCTL_DEBUG: "true"
      MONCTL_ENCRYPTION_KEY: "528e5bc0e961f2e5ab7a531e02e6067cc661f4367f033398fe4e84284565f94e"
      MONCTL_JWT_SECRET_KEY: "7f3a9c1d8e4b2f6a0d5c7e3b9a1f4d6c8e2b5a7d0f3c6e9b1a4d7f2c5e8b0a3"
      MONCTL_ADMIN_USERNAME: "admin"
      MONCTL_ADMIN_PASSWORD: "changeme"
      MONCTL_COLLECTOR_API_KEY: "collector-secret-key-changeme"
    volumes:
      - upgrades_data:/data/upgrades
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8443/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  collector:
    build:
      context: ..
      dockerfile: docker/Dockerfile.collector
    hostname: collector-01
    ports:
      - "127.0.0.1:50052:50052"
    environment:
      MONCTL_NODE_ID: collector-01
      MONCTL_CENTRAL_URL: http://central:8443
      MONCTL_CENTRAL_API_KEY: "collector-secret-key-changeme"
      MONCTL_VERIFY_SSL: "false"
      MONCTL_DB_PATH: /var/lib/monctl/cache.db
      MONCTL_CACHE_NODE: "localhost:50051"
      MONCTL_WORKER_ID: collector-01-worker-1
      MONCTL_APPS_DIR: /var/lib/monctl/apps
      MONCTL_VENVS_DIR: /var/lib/monctl/venvs
      MONCTL_GRPC_ADDRESS: "0.0.0.0:50051"
      # Registration
      MONCTL_REGISTRATION_TOKEN: monctl_rt_vLNI6x76_rvoKWSCdn9XrzY6cuCP8h7I8S4Zl2I2wZ0
      MONCTL_REGISTRATION_LABELS: '{"region": "local", "environment": "dev"}'
    volumes:
      - collector_data:/var/lib/monctl
    depends_on:
      central:
        condition: service_healthy

volumes:
  pgdata:
  chdata:
  collector_data:
  upgrades_data:
