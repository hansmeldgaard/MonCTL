# HAProxy + Keepalived — deploy on all 4 central nodes
# Each node needs .env with: KEEPALIVED_PRIORITY, KEEPALIVED_INTERFACE

services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: haproxy
    network_mode: host
    user: root
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - tls_certs:/etc/haproxy/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3

  keepalived:
    image: osixia/keepalived:2.0.20
    container_name: keepalived
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    environment:
      KEEPALIVED_INTERFACE: ${KEEPALIVED_INTERFACE:-eth0}
      KEEPALIVED_PRIORITY: ${KEEPALIVED_PRIORITY:-97}
    volumes:
      - ./keepalived.conf:/container/service/keepalived/assets/keepalived.conf
    restart: unless-stopped
    depends_on:
      haproxy:
        condition: service_healthy

volumes:
  tls_certs:
    name: monctl_tls_certs
