# HAProxy configuration for MonCTL Central HA
# Deploy on all 4 central nodes (central1-4)
# Frontend: HTTPS :443 → Backend: HTTP :8443 (round-robin)

global
    log stdout format raw local0
    maxconn 4096
    ssl-default-bind-options ssl-min-ver TLSv1.2
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  120s
    timeout server  120s
    retries 3
    option  redispatch

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/monctl.pem
    acl is_websocket path_beg /ws/
    acl is_apt      path_beg /apt/
    # Superset's JS bundle has URL strings baked in at build time that bypass
    # SCRIPT_NAME: /superset/log (telemetry), /static/assets/*.chunk.js (webpack
    # publicPath), /api/v1/{database,chart,dashboard,...} (SupersetClient base
    # URL). Rewrite all of these to /bi/* so they reach Superset through the
    # DispatcherMiddleware mount. MonCTL's /api/v1/* is disjoint from Superset's
    # /api/v1/* (collector paths: jobs, results, credentials, apps, heartbeat,
    # etc. — none collide). MonCTL uses NO /static/ or /superset/ routes.
    http-request replace-path ^/superset/(.*)$ /bi/superset/\1
    http-request replace-path ^/static/(.*)$ /bi/static/\1
    http-request replace-path ^/api/v1/(advanced_data_type|annotation_layer|assets|async_event|available_domains|cachekey|chart|css_template|dashboard|database|dataset|datasource|embedded_dashboard|explore|form_data|log|me|menu|query|report|rowlevelsecurity|saved_query|security|sqllab|tag|time_range|user)(/.*)?$ /bi/api/v1/\1\2
    # Top-level Superset view paths that FAB/Superset sometimes emits without
    # SCRIPT_NAME (e.g. <a href="/tablemodelview/list/">Datasets</a>). Excludes
    # login/logout/users/roles which collide with MonCTL SPA routes.
    http-request replace-path ^/(tablemodelview|sqllab|explore|chart|dashboard|databaseview|savedqueryview|tabstateview|tagview|alert|annotationlayer|report|rowlevelsecurity|csstemplatemodelview|csstemplateasyncmodelview|datasource|dataset|dashboardasync|sliceasync|sqlmetricinlineview|tablecolumninlineview|tableschemaview|logmodelview|embedded|dynamic-plugins|userinfoeditview|swagger|savedqueryviewapi|resetmypassword|resetpassword|registeruser)(/.*)?$ /bi/\1\2

    acl is_bi path_beg /bi/ /bi
    use_backend ws_backend       if is_websocket
    use_backend apt_cache        if is_apt
    use_backend superset_backend if is_bi
    default_backend central_nodes

    # Pass client IP to backend
    option forwardfor
    http-request set-header X-Forwarded-Proto https

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

backend central_nodes
    balance roundrobin
    option httpchk GET /v1/health
    http-check expect status 200

    server central1 10.145.210.41:8443 check inter 5s fall 3 rise 2
    server central2 10.145.210.42:8443 check inter 5s fall 3 rise 2
    server central3 10.145.210.43:8443 check inter 5s fall 3 rise 2
    server central4 10.145.210.44:8443 check inter 5s fall 3 rise 2

# ── Apt reverse-proxy cache (nginx on each central, port 18080) ──────────────
# Source IP hash for cache locality — each worker sticks to the same central,
# maximizing cache hit rate. Falls over gracefully if a node goes down.
backend apt_cache
    balance source
    hash-type consistent
    option httpchk GET /health
    http-check expect status 200
    timeout server 300s
    server central1 10.145.210.41:18080 check inter 10s fall 3 rise 2
    server central2 10.145.210.42:18080 check inter 10s fall 3 rise 2
    server central3 10.145.210.43:18080 check inter 10s fall 3 rise 2
    server central4 10.145.210.44:18080 check inter 10s fall 3 rise 2

# ── WebSocket (long-lived connections) ────────────────────────────────────────
backend ws_backend
    balance roundrobin
    option httpchk GET /v1/health
    http-check expect status 200
    timeout tunnel 1h
    timeout server 1h
    server central1 10.145.210.41:8443 check inter 5s fall 3 rise 2
    server central2 10.145.210.42:8443 check inter 5s fall 3 rise 2
    server central3 10.145.210.43:8443 check inter 5s fall 3 rise 2
    server central4 10.145.210.44:8443 check inter 5s fall 3 rise 2

# ── Superset (BI frontend on dev .10) ────────────────────────────────────────
# Served publicly under /bi/ instead of /superset/. Superset registers its own
# blueprint routes at literal /superset/* (e.g. /superset/welcome/, /superset/
# dashboard/) — so we cannot use /superset as the public URL prefix, otherwise
# stripping it would also consume Superset's internal route prefix.
# Single upstream — no HA for dev deployment.
backend superset_backend
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    # Let Superset build absolute URLs back to the public VIP rather than the
    # internal upstream host.
    http-request set-header X-Forwarded-Host %[req.hdr(host)]
    # Do NOT strip /bi — Superset's WSGI app is mounted at /bi via
    # DispatcherMiddleware in superset_config.py (FLASK_APP_MUTATOR). The
    # dispatcher strips the prefix AND populates SCRIPT_NAME so Flask's
    # url_for() emits /bi-prefixed URLs for every asset, login, API call.
    # X-Forwarded-Prefix is also sent in case any ProxyFix-dependent code
    # path reads it (belt + suspenders).
    http-request set-header X-Forwarded-Prefix /bi
    # Superset has hardcoded redirects like redirect("/superset/welcome/") that
    # bypass url_for() and therefore don't carry the /bi prefix. Prefix every
    # relative Location header that isn't already under /bi/. Absolute URLs
    # (http://..., https://...) are untouched.
    acl loc_already_bi  res.hdr(Location) -m beg /bi/
    acl loc_absolute    res.hdr(Location) -m reg ^[a-z]+:
    http-response replace-header Location ^/(.*)$ /bi/\1 if !loc_already_bi !loc_absolute
    timeout server 120s
    server superset1 10.145.210.10:8088 check inter 10s fall 3 rise 2

# ── PostgreSQL via Patroni ────────────────────────────────────────────────────
frontend pg_in
    bind *:5432
    mode tcp
    option tcplog
    timeout client 1h
    timeout server 1h
    default_backend pg_primary

backend pg_primary
    option http-keep-alive
    mode tcp
    option httpchk
    http-check send meth GET uri /primary
    http-check expect status 200

    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 10.145.210.41:5433 check port 8008
    server pg2 10.145.210.42:5433 check port 8008
