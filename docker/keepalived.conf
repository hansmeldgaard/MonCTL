# Keepalived configuration for MonCTL VIP
# Deploy on all 4 central nodes with different priority per node.
# Override KEEPALIVED_PRIORITY and KEEPALIVED_INTERFACE via environment.
#
# Priorities:
#   central1: 100, central2: 99, central3: 98, central4: 97

vrrp_script chk_haproxy {
    script "/usr/bin/killall -0 haproxy"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance MONCTL_VIP {
    state BACKUP
    interface ${KEEPALIVED_INTERFACE:-eth0}
    virtual_router_id 40
    priority ${KEEPALIVED_PRIORITY:-97}
    advert_int 1
    nopreempt

    authentication {
        auth_type PASS
        auth_pass monctlha
    }

    virtual_ipaddress {
        10.145.210.40/24
    }

    track_script {
        chk_haproxy
    }
}
