# MonCTL Central — standalone node (central4)
# Connects to shared Patroni/Redis cluster via PG_HOST/REDIS_HOST env vars.
# Deploy: scp to /opt/monctl/central/docker-compose.yml + .env
# Start:  cd /opt/monctl/central && docker compose up -d

services:
  central:
    image: monctl-central:latest
    ports:
      - "8443:8443"
    environment:
      MONCTL_DATABASE_URL: postgresql+asyncpg://monctl:${PG_PASSWORD}@${PG_HOST}:5432/monctl
      MONCTL_REDIS_URL: redis://${REDIS_HOST}:6379/0
      MONCTL_HOST: 0.0.0.0
      MONCTL_PORT: 8443
      MONCTL_DEBUG: "false"
      MONCTL_ROLE: ${MONCTL_ROLE:-api}
      MONCTL_ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MONCTL_JWT_SECRET_KEY: ${JWT_SECRET}
      MONCTL_ADMIN_USERNAME: admin
      MONCTL_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MONCTL_COLLECTOR_API_KEY: ${COLLECTOR_API_KEY}
      MONCTL_CLICKHOUSE_HOSTS: ${CLICKHOUSE_HOSTS}
      MONCTL_CLICKHOUSE_USER: ${MONCTL_CLICKHOUSE_USER:-monctl}
      MONCTL_CLICKHOUSE_PASSWORD: ${MONCTL_CLICKHOUSE_PASSWORD:-monctl}
      MONCTL_REDIS_SENTINEL_HOSTS: ${MONCTL_REDIS_SENTINEL_HOSTS:-}
      MONCTL_REDIS_SENTINEL_MASTER: ${MONCTL_REDIS_SENTINEL_MASTER:-monctl-redis}
      MONCTL_PATRONI_NODES: ${MONCTL_PATRONI_NODES:-}
      MONCTL_ETCD_NODES: ${MONCTL_ETCD_NODES:-}
      MONCTL_NODE_NAME: ${MONCTL_NODE_NAME:-}
      MONCTL_TLS_SAN_IPS: ${MONCTL_TLS_SAN_IPS:-}
    volumes:
      - upgrades_data:/data/upgrades
      - tls_certs:/etc/haproxy/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8443/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  upgrades_data:
  tls_certs:
    name: monctl_tls_certs
    external: true
