# MonCTL Central — single-node production (central1)
# Deploy: scp to /opt/monctl/central/docker-compose.yml + .env
# Start:  cd /opt/monctl/central && docker compose up -d

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: monctl
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: monctl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monctl"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  central:
    image: monctl-central:latest
    ports:
      - "8443:8443"
    environment:
      MONCTL_DATABASE_URL: postgresql+asyncpg://monctl:${PG_PASSWORD}@postgres:5432/monctl
      MONCTL_REDIS_URL: redis://redis:6379/0
      MONCTL_HOST: 0.0.0.0
      MONCTL_PORT: 8443
      MONCTL_DEBUG: "false"
      MONCTL_ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MONCTL_JWT_SECRET_KEY: ${JWT_SECRET}
      MONCTL_ADMIN_USERNAME: admin
      MONCTL_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MONCTL_COLLECTOR_API_KEY: ${COLLECTOR_API_KEY}
    volumes:
      - upgrades_data:/data/upgrades
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8443/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: monctl-grafana
    ports:
      - "3000:3000"
    environment:
      # ── Core config ────────────────────────────────────────────
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

      # ── Auth: anonymous read for embedded panels, admin for editing ──
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_NAME: "MonCTL"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-${ADMIN_PASSWORD}}

      # ── ClickHouse datasource (provisioned via file) ───────────
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-monctl}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-monctl}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-monctl}

      # ── Plugins ────────────────────────────────────────────────
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"

      # ── Branding ───────────────────────────────────────────────
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards/json:/var/lib/grafana/dashboards:ro
    depends_on:
      central:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  upgrades_data:
  grafana_data:
