services:
  docker-stats:
    image: monctl-docker-stats:latest
    container_name: monctl-docker-stats
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host_root:rw
    environment:
      MONCTL_HOST_LABEL: ${MONCTL_HOST_LABEL:-unknown}
      # Push mode (optional). Set these on central hosts too so the
      # sidecar streams host system + container stats into
      # host_metrics_history — otherwise only worker hosts appear on
      # the System Health → Host metrics chart.
      MONCTL_PUSH_URL: ${MONCTL_DOCKER_STATS_PUSH_URL:-}
      MONCTL_PUSH_API_KEY: ${MONCTL_DOCKER_STATS_PUSH_API_KEY:-}
      MONCTL_PUSH_VERIFY_SSL: ${MONCTL_DOCKER_STATS_PUSH_VERIFY_SSL:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
