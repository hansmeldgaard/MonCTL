# Patroni configuration template
# Environment variables override most settings at runtime.
scope: monctl
name: ${PATRONI_NAME:-pg1}

restapi:
  listen: 0.0.0.0:8008
  connect_address: ${NODE_IP:-10.145.210.41}:8008

etcd3:
  hosts: 10.145.210.41:2379,10.145.210.42:2379,10.145.210.43:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        max_connections: 200
        shared_buffers: 512MB
        effective_cache_size: 1536MB
        work_mem: 4MB
        wal_level: replica
        max_wal_senders: 5
        max_replication_slots: 5
        hot_standby: "on"
        synchronous_commit: "on"
  initdb:
    - encoding: UTF8
    - data-checksums
  pg_hba:
    - host replication replicator 10.145.210.0/24 md5
    - host all all 10.145.210.0/24 md5
    - host all all 0.0.0.0/0 md5
  users:
    monctl:
      password: ${PG_PASSWORD}
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: ${NODE_IP:-10.145.210.41}:5432
  data_dir: /var/lib/postgresql/data/patroni
  authentication:
    superuser:
      username: postgres
      password: ${PG_PASSWORD}
    replication:
      username: replicator
      password: ${PG_REPL_PASSWORD}
