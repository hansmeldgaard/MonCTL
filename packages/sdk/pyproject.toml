[project]
name = "monctl-sdk"
version = "0.1.0"
description = "SDK for building MonCTL monitoring apps"
requires-python = ">=3.11"
dependencies = [
    "monctl-common",
    "pydantic>=2.5",
]

[project.optional-dependencies]
http = ["aiohttp>=3.9"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.2",
    "mypy>=1.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/monctl_sdk"]
