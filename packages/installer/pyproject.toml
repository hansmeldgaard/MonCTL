[project]
name = "monctl-installer"
version = "0.1.0"
description = "MonCTL customer-facing installer and cluster control CLI"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "jinja2>=3.1",
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "rich>=13.7",
    "monctl-common",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.2",
    "mypy>=1.8",
    "types-pyyaml>=6.0",
]

[project.scripts]
monctl_ctl = "monctl_installer.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/monctl_installer"]
