[project]
name = "monctl-central"
version = "0.1.0"
description = "MonCTL central server"
requires-python = ">=3.11"
dependencies = [
    # Web framework
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    # Database
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    # Redis
    "redis[hiredis]>=5.0",
    # ClickHouse
    "clickhouse-connect>=0.7",
    # HTTP client
    "httpx>=0.27",
    # Scheduling
    "apscheduler>=3.10",
    "croniter>=2.0",
    # Validation and serialization
    "pydantic>=2.5",
    "pydantic-settings>=2.1",
    # Shared library
    "monctl-common",
    # Utilities
    "structlog>=24.1",
    "msgpack>=1.0",
    "python-multipart>=0.0.6",
    "bcrypt>=4.0",
    "cryptography>=42.0",
    "PyJWT>=2.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx",
    "coverage>=7.4",
    "ruff>=0.2",
    "mypy>=1.8",
    "aiosqlite>=0.20",
    "factory-boy>=3.3",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "unit: fast tests using SQLite in-memory (no Docker)",
    "integration: tests requiring docker-compose.test.yml services",
    "pg_only: tests that require PostgreSQL-specific features",
    "e2e: end-to-end Playwright browser tests",
]
filterwarnings = [
    "ignore::DeprecationWarning:sqlalchemy.*",
    "ignore::DeprecationWarning:fastapi.*",
    "ignore:The JWT key.*:UserWarning",
]

[tool.coverage.run]
source = ["src/monctl_central"]
omit = ["*/tests/*"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/monctl_central"]
