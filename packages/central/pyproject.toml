[project]
name = "monctl-central"
version = "0.1.0"
description = "MonCTL central server"
requires-python = ">=3.11"
dependencies = [
    # Web framework
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    # Database
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    # Redis
    "redis[hiredis]>=5.0",
    # ClickHouse
    "clickhouse-connect>=0.7",
    # HTTP client
    "httpx>=0.27",
    # Scheduling
    "apscheduler>=3.10",
    # Validation and serialization
    "pydantic>=2.5",
    "pydantic-settings>=2.1",
    # Shared library
    "monctl-common",
    # Utilities
    "structlog>=24.1",
    "msgpack>=1.0",
    "python-multipart>=0.0.6",
    "bcrypt>=4.0",
    "cryptography>=42.0",
    "PyJWT>=2.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx",
    "coverage>=7.4",
    "ruff>=0.2",
    "mypy>=1.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/monctl_central"]
