syntax = "proto3";

package collector;

// CollectorPeer — gRPC service between poll-workers/forwarder and their local cache-node.
service CollectorPeer {
  // Job distribution (poll-worker → local cache-node)
  rpc GetMyJobs(GetJobsRequest)            returns (GetJobsResponse);
  rpc ReportExecution(ReportExecutionReq)  returns (ReportExecutionResp);
  rpc RegisterWorker(RegisterWorkerReq)    returns (RegisterWorkerResp);

  // Credential fetch (poll-worker → local cache-node)
  rpc GetCredential(CredentialRequest)     returns (CredentialResponse);

  // Result submission (poll-worker/forwarder → local cache-node)
  rpc SubmitResult(SubmitResultRequest)    returns (SubmitResultResponse);

  // App code distribution (poll-worker → local cache-node)
  rpc GetAppCode(AppCodeRequest)           returns (AppCodeResponse);

  // App cache (poll-worker → local cache-node)
  rpc AppCacheGet(AppCacheGetRequest)       returns (AppCacheGetResponse);
  rpc AppCacheSet(AppCacheSetRequest)       returns (AppCacheSetResponse);
  rpc AppCacheDelete(AppCacheDeleteRequest) returns (AppCacheDeleteResponse);
}

// ─── Job Distribution ─────────────────────────────────────────────────────────

message AppInfo {
  string app_id  = 1;
  string version = 2;
}

message GetJobsRequest {
  string            worker_id   = 1;
  repeated AppInfo  loaded_apps = 2;   // apps the worker already has loaded
}

message ConnectorBindingProto {
  string connector_type       = 1;
  string connector_id         = 2;
  string connector_version_id = 3;
  string credential_name      = 4;
  // field 5 retired (was use_latest bool)
  reserved 5;
  string settings_json        = 6;
}

message JobWithProfile {
  string job_id             = 1;
  string device_id          = 2;
  string device_host        = 3;
  string app_id             = 4;
  string app_version        = 5;
  repeated string credential_names = 6;
  int32  interval           = 7;
  string parameters_json    = 8;
  int32  max_execution_time = 9;
  float  avg_execution_time = 10;
  bool   is_heavy           = 11;
  string role               = 12;
  repeated ConnectorBindingProto connector_bindings = 13;
  string app_checksum       = 14;
}

message GetJobsResponse {
  repeated JobWithProfile jobs = 1;
  repeated string immediate_job_ids = 2;
}

message ReportExecutionReq {
  string job_id         = 1;
  float  execution_time = 2;
  bool   error          = 3;
  string error_message  = 4;
}

message ReportExecutionResp {
  bool ok = 1;
}

message RegisterWorkerReq {
  string           worker_id   = 1;
  repeated AppInfo loaded_apps = 2;
}

message RegisterWorkerResp {
  bool ok = 1;
}

// ─── Credentials ─────────────────────────────────────────────────────────────

message CredentialRequest {
  string credential_name = 1;
}

message CredentialResponse {
  bool   found     = 1;
  string type      = 2;
  string data_json = 3;   // decrypted credential data as JSON
}

// ─── Result Submission ────────────────────────────────────────────────────────

message SubmitResultRequest {
  string job_id            = 1;
  string device_id         = 2;
  double timestamp         = 3;
  string metrics_json      = 4;
  string config_data_json  = 5;
  string status            = 6;
  bool   reachable         = 7;
  string error_message     = 8;
  int32  execution_time_ms = 9;
  float  rtt_ms            = 10;
  float  response_time_ms  = 11;
  double started_at        = 12;
  string collector_node    = 13;
  string interface_rows_json = 14;  // JSON-encoded list[dict] for interface pollers
  string error_category      = 15;  // "device", "config", "app", or ""
}

message SubmitResultResponse {
  bool accepted = 1;
}

// ─── App Code ─────────────────────────────────────────────────────────────────

message AppCodeRequest {
  string app_id  = 1;
  string version = 2;
}

message AppCodeResponse {
  bool   found             = 1;
  string code              = 2;
  string checksum          = 3;
  string requirements_json = 4;
  string entry_class       = 5;
}

// ─── App Cache ───────────────────────────────────────────────────────────────

message AppCacheGetRequest {
    string app_id    = 1;
    string device_id = 2;
    string cache_key = 3;
}

message AppCacheGetResponse {
    bool   found       = 1;
    string cache_value = 2;
}

message AppCacheSetRequest {
    string app_id       = 1;
    string device_id    = 2;
    string cache_key    = 3;
    string cache_value  = 4;
    int32  ttl_seconds  = 5;
}

message AppCacheSetResponse {
    bool ok = 1;
}

message AppCacheDeleteRequest {
    string app_id    = 1;
    string device_id = 2;
    string cache_key = 3;
}

message AppCacheDeleteResponse {
    bool ok = 1;
}
